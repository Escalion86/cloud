<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #ffedd5, #fff7ed 55%, #fffbeb);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        color: #7c2d12;
      }
      .card {
        max-width: 520px;
        margin: 24px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(234, 88, 12, 0.15);
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(124, 45, 18, 0.15);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Нет подключения к интернету</h1>
      <p>Cloud недоступен офлайн для этой операции. Проверьте сеть и обновите страницу.</p>
    </main>
  </body>
</html>
